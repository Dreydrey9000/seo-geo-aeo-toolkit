name = "dreythomas-seo-tool"
pages_build_output_dir = "public"
compatibility_date = "2024-11-06"

# Pages Function at functions/api/generate.js -> POST /api/generate
# Secret (set out-of-band, never committed):
#   GEMINI_API_KEY  -> server-side key the function uses to call Gemini (free tier, $0)
# Optional binding for rate limiting (needs KV token perm, not yet enabled):
#   RATE_KV (KV namespace) -> per-IP + daily request caps. Function degrades gracefully if absent.
